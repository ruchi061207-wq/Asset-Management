<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Asset Management </title>
  <link rel="stylesheet" href="Styles.css">
</head>
<body>

<h2>Asset Warranty Manager</h2>

<div class="dashboard">
  <div>Total: <span id="total"></span></div>
  <div>Expiring: <span id="expiring"></span></div>
  <div>Expired: <span id="expired"></span></div>
</div>

<div class="form">
  <input type="text" id="assetName" placeholder="Asset Name">
  <input type="text" id="serialNo" placeholder="Serial Number">
  <input type="text" id="vendorName" placeholder="Vendor Name">
  <input type="date" id="purchaseDate">
  <input type="date" id="expiryDate">
  <button onclick="addAsset()">Add Asset</button>
</div>

<div class="tools">
  <input type="text" id="search" placeholder="Search asset/serial/vendor field..." onkeyup="searchAsset()">
  <button onclick="exportExcel()">Export Excel</button>
</div>
  
<div class="filters">

<button onclick="filterAssets('all')">All</button>

<button onclick="filterAssets('active')">Active</button>

<button onclick="filterAssets('expiring')">Expiring</button>

<button onclick="filterAssets('expired')">Expired</button>

</div>

<table>
  <thead>
    <tr>
      <th>Asset</th>
      <th>Serial No</th>
      <th>Vendor</th>
      <th>Purchase</th>
      <th>Expiry</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="assetTable"></tbody>
</table>

<!-- Popup -->
<div id="popup" class="popup">
  <div class="popup-content">
    <span onclick="closePopup()" class="close">&times;</span>
    <p id="popupMessage"></p>
  </div>
</div>

  <!-- EmailJS Library -->

</body>
</html>
